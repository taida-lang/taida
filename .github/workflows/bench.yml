name: Bench

# D28B-005 / D28B-013 perf regression gates (@d.X).
#
# Two parallel hard-fail gates run in this workflow:
#
#   1. **Throughput regression** (D28B-005, inherits from C26B-004).
#      `benches/perf_baseline.rs` + the RUN_BENCHMARKS=1 NET6-3b h2
#      throughput tests are gated with a +10% tolerance against the
#      committed 30-sample EWMA baseline at
#      `.github/bench-baselines/perf_baseline.json`.
#
#   2. **Peak RSS regression** (D28B-013 acceptance #2). The
#      `examples/quality/d28_perf_smoke/*.td` fixtures are measured
#      via `/usr/bin/time -v` (see `scripts/perf/measure_peak_rss.sh`)
#      and gated with the same +10% tolerance + 30-sample EWMA logic
#      against `scripts/perf/peak_rss_baseline.json`.
#
# Both gates use `scripts/bench/compare_baseline.py` so the state
# machine is identical:
#   - `pull_request`: runs both gates against the committed baselines.
#     Per-bench/per-fixture entries with fewer than `min_samples_required`
#     (30) samples emit WARN and do not fail the job. Entries that
#     have met the sample-count threshold and regress beyond
#     tolerance fail the job hard.
#   - `push` to main: runs both, updates both baseline JSONs (EWMA
#     median + increment sample_count), and commits the updates back
#     to main via the `update-baseline` job.
#   - `schedule` / `workflow_dispatch`: same as PR (gate-only, no
#     baseline update).
#
# Scope isolation: this workflow owns `.github/workflows/bench.yml`,
# `scripts/bench/**`, `scripts/perf/**`, `.github/bench-baselines/**`,
# and `examples/quality/d28_perf_smoke/**`. It does not touch
# `.github/workflows/ci.yml`, `security.yml`, `release.yml`,
# `coverage.yml`, or `memory.yml`.
#
# `continue-on-error` is intentionally not set: warn-only suppression
# is now handled inside `compare_baseline.py` on a per-bench basis via
# `min_samples_required`. The 30-sample window protects newly-added
# fixtures from gating before their EWMA stabilises.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop, feat/c26, feat/d28]
  schedule:
    # Nightly at 05:00 UTC to collect samples on a quiet schedule and
    # catch slow drift between PRs.
    - cron: "0 5 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

concurrency:
  group: bench-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  bench:
    name: Perf baselines
    runs-on: ubuntu-latest
    # D28B-005 / D28B-013 hard-fail: no `continue-on-error`. Warn-only
    # suppression is now handled inside `compare_baseline.py` on a
    # per-bench basis via `min_samples_required`.
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-base
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Setup Python (for compare_baseline.py)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install /usr/bin/time (for peak RSS gate)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends time
          /usr/bin/time --version

      - name: Run perf_baseline bench
        # --sample-size 20 keeps wall-clock < 10 min while preserving
        # enough samples for criterion's bootstrap CI to tighten.
        # Output is captured in bencher format for compare_baseline.py.
        run: |
          set -euo pipefail
          cargo bench --bench perf_baseline -- \
              --sample-size 20 \
              --output-format bencher \
              | tee bench-results.txt
          echo "bench-results.txt size: $(wc -l < bench-results.txt) lines"

      - name: Run NET6-3b h2 throughput benchmarks
        id: net_bench
        # The three h2 benches are gated by RUN_BENCHMARKS=1. They
        # must emit all three NET6-3b-{2,3,4} measurement lines.
        # Missing curl --http2 or a skipped bench is a gate failure,
        # not a silently green run.
        env:
          RUN_BENCHMARKS: "1"
        run: |
          set -euo pipefail
          cargo test --release --test parity \
              test_net6_3b_native_h2_32_request_throughput_benchmark \
              test_net6_3b_native_h2_64kib_data_benchmark \
              test_net6_3b_native_h2_32_stream_multiplex_benchmark \
              -- --nocapture --test-threads=1 \
              2>&1 | tee cargo-test-net.log

      - name: Parse NET6-3b h2 benchmark lines into bencher format
        run: |
          python3 scripts/bench/parse_net_throughput.py \
              --cargo-test-log cargo-test-net.log \
              --output bench-results-net.txt
          # Append NET benches to the criterion bencher output so the
          # regression gate sees one combined result set.
          if [ -s bench-results-net.txt ]; then
              cat bench-results-net.txt >> bench-results.txt
          fi

      - name: Compare against throughput baseline (regression gate)
        # D28B-005 hard-fail gate. Benches below the min-samples
        # threshold in the baseline JSON emit WARN and do not trigger
        # failure; see `compare_baseline.py` for the state machine.
        run: |
          python3 scripts/bench/compare_baseline.py \
              --bencher-out bench-results.txt \
              --baseline .github/bench-baselines/perf_baseline.json \
              --tolerance-pct 10.0 \
              --min-samples 30

      - name: Build release taida binary (for peak RSS gate)
        # The peak-RSS gate measures /usr/bin/time -v on a release
        # build of the taida CLI. Reuse the cargo cache populated by
        # the `cargo bench` step above.
        run: cargo build --release --bin taida

      - name: Measure peak RSS on d28_perf_smoke fixtures
        # D28B-013 acceptance #2. The script writes
        # target/perf-rss/peak_rss_results.txt in bencher format so
        # compare_baseline.py can ingest it.
        run: |
          set -euo pipefail
          ./scripts/perf/measure_peak_rss.sh ./target/release/taida
          # Copy the results into the workspace root so the upload-
          # artifact step picks it up alongside the throughput data.
          cp target/perf-rss/peak_rss_results.txt bench-results-rss.txt

      - name: Compare against peak-RSS baseline (regression gate)
        # D28B-013 hard-fail gate. Same state machine as throughput.
        run: |
          python3 scripts/bench/compare_baseline.py \
              --bencher-out bench-results-rss.txt \
              --baseline scripts/perf/peak_rss_baseline.json \
              --tolerance-pct 10.0 \
              --min-samples 30

      - name: Upload bench results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-baseline-${{ github.sha }}
          path: |
            bench-results.txt
            bench-results-net.txt
            bench-results-rss.txt
            cargo-test-net.log
            target/criterion/**/estimates.json
            target/perf-rss/**/*.log
          if-no-files-found: warn
          retention-days: 30

  # D28B-005 / D28B-013: main-branch baseline collection job. Uses
  # the bench run results from the `bench` job to advance both
  # committed baseline JSONs (EWMA median + increment sample_count)
  # and commits the updates back to main. PR runs skip this job via
  # the `if:` guard.
  update-baseline:
    name: Update baseline (main only)
    runs-on: ubuntu-latest
    needs: bench
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          # Need full history for the commit we push back.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Download bench results
        uses: actions/download-artifact@v4
        with:
          name: perf-baseline-${{ github.sha }}
          path: bench-artifacts
      - name: Update throughput baseline JSON
        run: |
          python3 scripts/bench/update_baseline.py \
              --bencher-out bench-artifacts/bench-results.txt \
              --baseline .github/bench-baselines/perf_baseline.json
      - name: Update peak-RSS baseline JSON
        if: hashFiles('bench-artifacts/bench-results-rss.txt') != ''
        run: |
          python3 scripts/bench/update_baseline.py \
              --bencher-out bench-artifacts/bench-results-rss.txt \
              --baseline scripts/perf/peak_rss_baseline.json
      - name: Commit baseline updates
        # Only commit if at least one baseline actually changed.
        run: |
          set -euo pipefail
          changed=0
          if ! git diff --quiet .github/bench-baselines/perf_baseline.json; then
              changed=1
          fi
          if ! git diff --quiet scripts/perf/peak_rss_baseline.json; then
              changed=1
          fi
          if [[ "${changed}" -eq 0 ]]; then
              echo "baselines unchanged; nothing to commit"
              exit 0
          fi
          git config user.name  "taida-bench-bot"
          git config user.email "taida-bench-bot@users.noreply.github.com"
          git add .github/bench-baselines/perf_baseline.json
          git add scripts/perf/peak_rss_baseline.json
          git commit -m "chore(bench): D28B-005 / D28B-013 update perf + RSS baselines (auto)

sha: ${{ github.sha }}
workflow: ${{ github.workflow }}
run: ${{ github.run_id }}"
          git push origin HEAD:main
