name: CI

on:
  push:
    branches: [main, develop, "feat/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

# C24 Phase 5 (RC-SLOW-5 / C24B-008): cancel stale CI runs from force-pushes.
# PR branch pushes continue to target the PR ref; the concurrency group keys
# on both workflow+ref so different PRs don't cancel each other.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@2ea1b3bdd0261867664fd125505456a7b9c3385c # 1.93.1
      # C25B-003 Phase 2B: migrate from hand-rolled actions/cache to
      # Swatinem/rust-cache. Advantages:
      #  - save-on-success semantics avoid polluting the cache with broken
      #    artefacts from failed runs
      #  - incremental target cleanup (rust-cache prunes unreferenced
      #    .rmeta / .rlib before upload) keeps restore size bounded
      #  - shared-key allows explicit cross-job cache sharing without the
      #    hand-maintained `cargo-base` restore-keys fallback
      #  - automatic `cargo-home` + per-job target partitioning
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          shared-key: cargo-base
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo check --all-targets

  # C25B-003 Phase 2D: build test binaries exactly once via `cargo nextest
  # archive` and reuse the archive in the downstream `test` job. Previously
  # `check` and `test` each produced their own .rmeta/.rlib via
  # `cargo check --all-targets` followed by `cargo nextest run --all-targets`,
  # and the cross-job Swatinem cache (Phase 2B) only partially closed the gap
  # (the `test` job still had to re-link test binaries under its own
  # partition). The archive job produces a single tarball
  # (`taida-nextest.tar.zst`) containing every test binary plus the host
  # `target/debug/taida` CLI; consumers use
  # `cargo nextest run --archive-file ...` and skip compilation entirely.
  #
  # Archive consumer safety: Taida integration tests no longer rely on
  # `env!("CARGO_BIN_EXE_taida")` compile-time absolute paths. They resolve
  # the CLI at runtime from the archive-extracted workspace (`target/debug/taida`)
  # or a runtime env override, so archive-build and archive-consumer runners may
  # differ without `ENOENT`.
  #
  # Why not reuse for `parity` / `e2e`?
  #   - `parity` shells out to `tests/run_backend_parity.sh` which invokes
  #     `cargo test --test <name>` three times. Those code paths expect
  #     live cargo metadata (not an archive); leaving them on Swatinem
  #     cache keeps the backend-parity semantics unchanged.
  #   - `e2e` needs `target/release/taida` (a CLI, not a test binary).
  #     nextest archive doesn't ship release artifacts.
  build-archive:
    name: Build Test Archive
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@2ea1b3bdd0261867664fd125505456a7b9c3385c # 1.93.1
      - uses: taiki-e/install-action@285e94bf531e72a83c0923d52526fabb44c3b169 # nextest
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          shared-key: cargo-base
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Build taida CLI for archive
        env:
          RUSTFLAGS: "-D warnings --cfg taida_allow_mock_github_base_url"
        run: cargo build --bin taida
      - name: Build nextest archive
        env:
          RUSTFLAGS: "-D warnings --cfg taida_allow_mock_github_base_url"
        run: cargo nextest archive --all-targets --archive-file taida-nextest.tar.zst
      - name: Archived taida mock-base gate
        run: |
          probe_dir="${RUNNER_TEMP}/archive-mock-base-gate"
          rm -rf "${probe_dir}"
          mkdir -p "${probe_dir}/extract" "${probe_dir}/home" "${probe_dir}/project"
          tar --zstd -xf taida-nextest.tar.zst -C "${probe_dir}/extract" target/debug/taida
          chmod +x "${probe_dir}/extract/target/debug/taida"
          touch "${probe_dir}/project/taida.toml"
          cat > "${probe_dir}/project/packages.tdm" <<'EOF'
          [packages."taida-lang/mock"]
          version = "a.1"
          integrity = "sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"

          <<<@a.1 test/probe
          EOF
          printf 'stdout("probe")\n' > "${probe_dir}/project/main.td"
          set +e
          HOME="${probe_dir}/home" \
            TAIDA_GITHUB_BASE_URL="http://127.0.0.1:1" \
            TAIDA_E32_ALLOW_MOCK_GITHUB_BASE_URL="1" \
            TAIDA_GITHUB_API_URL="http://127.0.0.1:1" \
            GH_TOKEN="unused" \
            "${probe_dir}/extract/target/debug/taida" ingot install --no-remote-check \
              >"${probe_dir}/stdout" 2>"${probe_dir}/stderr"
          status=$?
          set -e
          if grep -q "E32K3_GITHUB_BASE_URL_CONFINED" "${probe_dir}/stderr"; then
            cat "${probe_dir}/stderr"
            exit 1
          fi
          if [ "${status}" -eq 0 ]; then
            echo "closed loopback source install unexpectedly succeeded"
            exit 1
          fi
      - name: Direct taida binary path gate
        run: cargo test --test archive_path_gate -- --nocapture
      - name: Upload nextest archive
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: nextest-archive
          path: taida-nextest.tar.zst
          retention-days: 1
          if-no-files-found: error

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build-archive
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@2ea1b3bdd0261867664fd125505456a7b9c3385c # 1.93.1
      - uses: taiki-e/install-action@285e94bf531e72a83c0923d52526fabb44c3b169 # nextest
      - name: Install wasmtime
        run: |
          set -euo pipefail
          WASMTIME_VERSION=v33.0.0
          WASMTIME_SHA256=075d491ad2c9855c6247b7ca4284a833d1f3b51e85339e0f6be4e64620ea7f40
          curl -L "https://github.com/bytecodealliance/wasmtime/releases/download/${WASMTIME_VERSION}/wasmtime-${WASMTIME_VERSION}-x86_64-linux.tar.xz" -o wasmtime.tar.xz
          echo "${WASMTIME_SHA256}  wasmtime.tar.xz" | sha256sum -c -
          tar xf wasmtime.tar.xz
          mv "wasmtime-${WASMTIME_VERSION}-x86_64-linux/wasmtime" "$HOME/.wasmtime-bin"
          mkdir -p "$HOME/.wasmtime/bin"
          mv "$HOME/.wasmtime-bin" "$HOME/.wasmtime/bin/wasmtime"
          echo "$HOME/.wasmtime/bin" >> "$GITHUB_PATH"
      - name: Download nextest archive
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: nextest-archive
      # `cargo nextest run --archive-file` skips compilation entirely and
      # loads test binaries directly from the archive. `--workspace-remap .`
      # tells nextest the repository root at test-run time (fixture paths in
      # `tests/**/*.rs` resolve relative to workspace root at runtime).
      - run: |
          mkdir -p "${RUNNER_TEMP}/nextest-archive"
          TAIDA_BIN="${RUNNER_TEMP}/nextest-archive/target/debug/taida" \
            cargo nextest run \
              --archive-file taida-nextest.tar.zst \
              --extract-to "${RUNNER_TEMP}/nextest-archive" \
              --extract-overwrite \
              --workspace-remap . \
              --profile ci

  parity:
    name: Backend Parity
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@2ea1b3bdd0261867664fd125505456a7b9c3385c # 1.93.1
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          shared-key: cargo-base
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
      - run: ./tests/run_backend_parity.sh

  e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@2ea1b3bdd0261867664fd125505456a7b9c3385c # 1.93.1
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          shared-key: cargo-base
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo build --release
      - name: Run E2E smoke tests
        run: TAIDA_BIN="$PWD/target/release/taida" ./tests/e2e_smoke.sh

  e32-loopback-smoke:
    name: E32 Loopback Smoke
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@2ea1b3bdd0261867664fd125505456a7b9c3385c # 1.93.1
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          shared-key: cargo-base
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo build --bin taida
      - name: Run E32 loopback smoke
        run: |
          mkdir -p "${RUNNER_TEMP}/e32-loopback-smoke"
          TAIDA_BIN="$PWD/target/debug/taida" \
          E32_LOOPBACK_ARTIFACT_DIR="${RUNNER_TEMP}/e32-loopback-smoke" \
          ./tests/run_e32_loopback_smoke.sh
      - name: Upload E32 loopback traces
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: e32-loopback-smoke-${{ github.sha }}
          path: ${{ runner.temp }}/e32-loopback-smoke
          if-no-files-found: ignore

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@2ea1b3bdd0261867664fd125505456a7b9c3385c # 1.93.1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          shared-key: cargo-base
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo clippy --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@2ea1b3bdd0261867664fd125505456a7b9c3385c # 1.93.1
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  mold-surface:
    name: Mold Surface Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - run: python3 scripts/lint/mold_surface_drift.py --strict

  # D28B-008 Round 3 wK — naming-convention lint hard-fail.
  #
  # Pins the D28B-001 (Phase 0 2026-04-26 Lock) category-based naming
  # rules at the parser/AST level via `taida way lint`. Diagnostic codes
  # E1801..E1809 are emitted on violations; this job fails (`continue-on-error`
  # is intentionally NOT set) if any user-facing example regresses.
  #
  # Scope (curated to user-facing tutorials + reference packages):
  #   - Top-level `examples/*.td` minus compiler regression fixtures
  #     (`compile_*.td`) and known-incompatible legacy fixtures
  #     (`addon_terminal.td` has parse errors).
  #   - `examples/complex/` (multi-file demo apps).
  #   - `examples/embedding/` (host-language embedding samples).
  #
  # Out of scope (intentional violations testing compiler edge cases):
  #   - `examples/compile_*.td` (codegen regression fixtures with
  #     deliberate snake_case function names testing tag propagation
  #     and JSON field aliasing).
  #   - `examples/quality/` (compiler regression test fixtures).
  #   - `examples/wasm_min_pi_approx.td` is in the user-facing scope
  #     (now compliant after the wK sweep).
  #
  # See `docs/reference/naming_conventions.md` (D28B-001 Lock) and
  # `docs/reference/diagnostic_codes.md` (E18xx band) for the full
  # rules and exemptions.
  lint:
    name: Lint (D28B-008 naming conventions)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@2ea1b3bdd0261867664fd125505456a7b9c3385c # 1.93.1
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          shared-key: cargo-base
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Build taida CLI (debug)
        run: cargo build --bin taida
      - name: Lint top-level user-facing examples
        run: |
          set -e
          # Curated scope — exclude compile_*.td (codegen regression
          # fixtures), addon_terminal.td (baseline parse errors), and
          # the quality/ subtree (compiler quality gate fixtures).
          # Iterate via glob + case-pattern guard (SC2010 avoids ls|grep).
          shopt -s nullglob
          for f in examples/*.td; do
            case "$f" in
              examples/compile_*|examples/addon_terminal*) continue ;;
            esac
            ./target/debug/taida way lint --quiet "$f" || {
              echo "Lint failed for $f:"
              ./target/debug/taida way lint "$f"
              exit 1
            }
          done
      - name: Lint complex examples
        run: ./target/debug/taida way lint --quiet examples/complex
      - name: Lint embedding examples (if any present)
        run: |
          if [ -d examples/embedding ]; then
            ./target/debug/taida way lint --quiet examples/embedding
          fi

  ignored-inventory:
    name: Ignored / optional test inventory
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: check
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@2ea1b3bdd0261867664fd125505456a7b9c3385c # 1.93.1
      - uses: taiki-e/install-action@285e94bf531e72a83c0923d52526fabb44c3b169 # nextest
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          shared-key: cargo-base
      - name: List ignored tests inventory
        run: cargo nextest list --profile ci --run-ignored only

  # D29B-010 / Lock-G: workflow YAML hard-fail audit.
  #
  # `bench.yml` / `perf-router.yml` reproduced an `Invalid workflow file:
  # Unexpected value 'sha', 'workflow', 'run'` startup failure across at
  # least six consecutive `main` runs (24935511415 .. 24967722690 in
  # 2026-04-25 .. 2026-04-26), silently disabling the D28B-005 / D28B-013
  # / C26B-024 perf hard-fail gates. Lock-G mandates a `actionlint` step
  # that fails the CI hard so any future structural regression of any
  # workflow file is caught at PR review, not in production releases.
  workflow-lint:
    name: Workflow Lint (D29B-010)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install actionlint
        run: |
          set -euo pipefail
          ACTIONLINT_VERSION=1.7.12
          ACTIONLINT_SHA256=8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
          curl -L "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" -o actionlint.tar.gz
          echo "${ACTIONLINT_SHA256}  actionlint.tar.gz" | sha256sum -c -
          mkdir -p "$RUNNER_TEMP/actionlint"
          tar -xzf actionlint.tar.gz -C "$RUNNER_TEMP/actionlint"
          echo "$RUNNER_TEMP/actionlint" >> "$GITHUB_PATH"
      - name: Reject unverified workflow shell installers
        run: |
          set -euo pipefail
          curl_pipe='curl .*\| *bash'
          wget_pipe='wget .*\| *sh'
          bash_curl='bash +<\(curl'
          if grep -RInE "${curl_pipe}|${wget_pipe}|${bash_curl}" .github/workflows; then
            echo "::error::Workflow shell installers must use pinned archives with digest verification."
            exit 1
          fi
      - name: Run actionlint over all workflows
        run: |
          actionlint -color .github/workflows/*.yml
