name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

# C24 Phase 5 (RC-SLOW-5 / C24B-008): cancel stale CI runs from force-pushes.
# PR branch pushes continue to target the PR ref; the concurrency group keys
# on both workflow+ref so different PRs don't cancel each other.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      # C25B-003 Phase 2B: migrate from hand-rolled actions/cache to
      # Swatinem/rust-cache@v2. Advantages:
      #  - save-on-success semantics avoid polluting the cache with broken
      #    artefacts from failed runs
      #  - incremental target cleanup (rust-cache prunes unreferenced
      #    .rmeta / .rlib before upload) keeps restore size bounded
      #  - shared-key allows explicit cross-job cache sharing without the
      #    hand-maintained `cargo-base` restore-keys fallback
      #  - automatic `cargo-home` + per-job target partitioning
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-base
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo check --all-targets

  # C25B-003 Phase 2D: build test binaries exactly once via `cargo nextest
  # archive` and reuse the archive in the downstream `test` job. Previously
  # `check` and `test` each produced their own .rmeta/.rlib via
  # `cargo check --all-targets` followed by `cargo nextest run --all-targets`,
  # and the cross-job Swatinem cache (Phase 2B) only partially closed the gap
  # (the `test` job still had to re-link test binaries under its own
  # partition). The archive job produces a single tarball
  # (`taida-nextest.tar.zst`) containing every test binary plus the host
  # `target/debug/taida` CLI; consumers use
  # `cargo nextest run --archive-file ...` and skip compilation entirely.
  #
  # Archive consumer safety: Taida integration tests no longer rely on
  # `env!("CARGO_BIN_EXE_taida")` compile-time absolute paths. They resolve
  # the CLI at runtime from the archive-extracted workspace (`target/debug/taida`)
  # or a runtime env override, so archive-build and archive-consumer runners may
  # differ without `ENOENT`.
  #
  # Why not reuse for `parity` / `e2e`?
  #   - `parity` shells out to `tests/run_backend_parity.sh` which invokes
  #     `cargo test --test <name>` three times. Those code paths expect
  #     live cargo metadata (not an archive); leaving them on Swatinem
  #     cache keeps the backend-parity semantics unchanged.
  #   - `e2e` needs `target/release/taida` (a CLI, not a test binary).
  #     nextest archive doesn't ship release artifacts.
  build-archive:
    name: Build Test Archive
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-base
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Build nextest archive
        run: cargo nextest archive --all-targets --archive-file taida-nextest.tar.zst
      - name: Upload nextest archive
        uses: actions/upload-artifact@v4
        with:
          name: nextest-archive
          path: taida-nextest.tar.zst
          retention-days: 1
          if-no-files-found: error

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build-archive
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest
      - name: Install wasmtime
        run: |
          WASMTIME_VERSION=v33.0.0
          curl -L "https://github.com/bytecodealliance/wasmtime/releases/download/${WASMTIME_VERSION}/wasmtime-${WASMTIME_VERSION}-x86_64-linux.tar.xz" -o wasmtime.tar.xz
          tar xf wasmtime.tar.xz
          mv "wasmtime-${WASMTIME_VERSION}-x86_64-linux/wasmtime" "$HOME/.wasmtime-bin"
          mkdir -p "$HOME/.wasmtime/bin"
          mv "$HOME/.wasmtime-bin" "$HOME/.wasmtime/bin/wasmtime"
          echo "$HOME/.wasmtime/bin" >> $GITHUB_PATH
      - name: Download nextest archive
        uses: actions/download-artifact@v4
        with:
          name: nextest-archive
      # `cargo nextest run --archive-file` skips compilation entirely and
      # loads test binaries directly from the archive. `--workspace-remap .`
      # tells nextest the repository root at test-run time (fixture paths in
      # `tests/**/*.rs` resolve relative to workspace root at runtime).
      - run: cargo nextest run --archive-file taida-nextest.tar.zst --workspace-remap . --profile ci

  parity:
    name: Backend Parity
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-base
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: ./tests/run_backend_parity.sh

  e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-base
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo build --release
      - name: Run E2E smoke tests
        run: TAIDA_BIN=./target/release/taida ./tests/e2e_smoke.sh

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-base
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo clippy --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # D28B-008 Round 3 wK — naming-convention lint hard-fail.
  #
  # Pins the D28B-001 (Phase 0 2026-04-26 Lock) category-based naming
  # rules at the parser/AST level via `taida lint`. Diagnostic codes
  # E1801..E1809 are emitted on violations; this job fails (`continue-on-error`
  # is intentionally NOT set) if any user-facing example regresses.
  #
  # Scope (curated to user-facing tutorials + reference packages):
  #   - Top-level `examples/*.td` minus compiler regression fixtures
  #     (`compile_*.td`) and known-incompatible legacy fixtures
  #     (`addon_terminal.td` has parse errors).
  #   - `examples/complex/` (multi-file demo apps).
  #   - `examples/embedding/` (host-language embedding samples).
  #
  # Out of scope (intentional violations testing compiler edge cases):
  #   - `examples/compile_*.td` (codegen regression fixtures with
  #     deliberate snake_case function names testing tag propagation
  #     and JSON field aliasing).
  #   - `examples/quality/` (compiler regression test fixtures).
  #   - `examples/wasm_min_pi_approx.td` is in the user-facing scope
  #     (now compliant after the wK sweep).
  #
  # See `docs/reference/naming_conventions.md` (D28B-001 Lock) and
  # `docs/reference/diagnostic_codes.md` (E18xx band) for the full
  # rules and exemptions.
  lint:
    name: Lint (D28B-008 naming conventions)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-base
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Build taida CLI (debug)
        run: cargo build --bin taida
      - name: Lint top-level user-facing examples
        run: |
          set -e
          # Curated scope — exclude compile_*.td (codegen regression
          # fixtures), addon_terminal.td (baseline parse errors), and
          # the quality/ subtree (compiler quality gate fixtures).
          for f in $(ls examples/*.td | grep -vE 'examples/(compile_|addon_terminal)'); do
            ./target/debug/taida lint --quiet "$f" || {
              echo "Lint failed for $f:"
              ./target/debug/taida lint "$f"
              exit 1
            }
          done
      - name: Lint complex examples
        run: ./target/debug/taida lint --quiet examples/complex
      - name: Lint embedding examples (if any present)
        run: |
          if [ -d examples/embedding ]; then
            ./target/debug/taida lint --quiet examples/embedding
          fi

  # D29B-010 / Lock-G: workflow YAML hard-fail audit.
  #
  # `bench.yml` / `perf-router.yml` reproduced an `Invalid workflow file:
  # Unexpected value 'sha', 'workflow', 'run'` startup failure across at
  # least six consecutive `main` runs (24935511415 .. 24967722690 in
  # 2026-04-25 .. 2026-04-26), silently disabling the D28B-005 / D28B-013
  # / C26B-024 perf hard-fail gates. Lock-G mandates a `actionlint` step
  # that fails the CI hard so any future structural regression of any
  # workflow file is caught at PR review, not in production releases.
  workflow-lint:
    name: Workflow Lint (D29B-010)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install actionlint
        run: |
          bash <(curl --proto '=https' --tlsv1.2 -sSfL \
            https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          echo "$PWD" >> "$GITHUB_PATH"
      - name: Run actionlint over all workflows
        run: |
          actionlint -color .github/workflows/*.yml
