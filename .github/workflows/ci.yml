name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

# C24 Phase 5 (RC-SLOW-5 / C24B-008): cancel stale CI runs from force-pushes.
# PR branch pushes continue to target the PR ref; the concurrency group keys
# on both workflow+ref so different PRs don't cancel each other.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      # C25B-003 Phase 2B: migrate from hand-rolled actions/cache to
      # Swatinem/rust-cache@v2. Advantages:
      #  - save-on-success semantics avoid polluting the cache with broken
      #    artefacts from failed runs
      #  - incremental target cleanup (rust-cache prunes unreferenced
      #    .rmeta / .rlib before upload) keeps restore size bounded
      #  - shared-key allows explicit cross-job cache sharing without the
      #    hand-maintained `cargo-base` restore-keys fallback
      #  - automatic `cargo-home` + per-job target partitioning
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-base
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo check --all-targets

  # C25B-003 Phase 2D: attempted `cargo nextest archive` + download in the
  # downstream `test` job. On PR #39 the archive path turned out to be a
  # bad fit for Taida's integration-test suite: 24 test files embed an
  # absolute `env!("CARGO_BIN_EXE_taida")` at compile time, and that path
  # (from the archive-build runner) does not resolve on the consumer
  # runner even when the host binary is rebuilt. Reverted to the Phase 2B
  # arrangement (per-job `cargo nextest run` with a shared Swatinem cache).
  # Phase 2D re-introduction is deferred; revisit once integration tests
  # migrate to `CARGO_BIN_EXE_taida` runtime-lookup helpers.
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-base
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install wasmtime
        run: |
          WASMTIME_VERSION=v33.0.0
          curl -L "https://github.com/bytecodealliance/wasmtime/releases/download/${WASMTIME_VERSION}/wasmtime-${WASMTIME_VERSION}-x86_64-linux.tar.xz" -o wasmtime.tar.xz
          tar xf wasmtime.tar.xz
          mv "wasmtime-${WASMTIME_VERSION}-x86_64-linux/wasmtime" "$HOME/.wasmtime-bin"
          mkdir -p "$HOME/.wasmtime/bin"
          mv "$HOME/.wasmtime-bin" "$HOME/.wasmtime/bin/wasmtime"
          echo "$HOME/.wasmtime/bin" >> $GITHUB_PATH
      - run: cargo nextest run --all-targets --profile ci

  parity:
    name: Backend Parity
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-base
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: ./tests/run_backend_parity.sh

  e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-base
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo build --release
      - name: Run E2E smoke tests
        run: TAIDA_BIN=./target/release/taida ./tests/e2e_smoke.sh

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-base
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo clippy --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
