name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

# C24 Phase 5 (RC-SLOW-5 / C24B-008): cancel stale CI runs from force-pushes.
# PR branch pushes continue to target the PR ref; the concurrency group keys
# on both workflow+ref so different PRs don't cancel each other.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cargo/git/checkouts/
            target/
          # C24 Phase 5 (RC-SLOW-6 / C24B-008 adjacent): share a
          # `cargo-base` warm cache across jobs so check / test / parity /
          # e2e / clippy no longer each bring their own cold target/
          # build. Job-specific key takes first priority on exact match;
          # missing cases fall through `cargo-base` before giving up.
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-base-${{ hashFiles('**/Cargo.lock') }}
            ${{ runner.os }}-cargo-base-
            ${{ runner.os }}-cargo-
      - run: cargo check --all-targets

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest
      - name: Install wasmtime
        run: |
          WASMTIME_VERSION=v33.0.0
          curl -L "https://github.com/bytecodealliance/wasmtime/releases/download/${WASMTIME_VERSION}/wasmtime-${WASMTIME_VERSION}-x86_64-linux.tar.xz" -o wasmtime.tar.xz
          tar xf wasmtime.tar.xz
          mv "wasmtime-${WASMTIME_VERSION}-x86_64-linux/wasmtime" "$HOME/.wasmtime-bin"
          mkdir -p "$HOME/.wasmtime/bin"
          mv "$HOME/.wasmtime-bin" "$HOME/.wasmtime/bin/wasmtime"
          echo "$HOME/.wasmtime/bin" >> $GITHUB_PATH
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cargo/git/checkouts/
            target/
          # Write canonical cargo-base cache from Unit Tests (largest
          # target/ of all jobs). Other jobs restore it via `cargo-base`
          # restore-keys.
          key: ${{ runner.os }}-cargo-base-${{ hashFiles('**/Cargo.lock') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-cargo-base-${{ hashFiles('**/Cargo.lock') }}
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-base-
            ${{ runner.os }}-cargo-
      - run: cargo nextest run --all-targets --profile ci

  parity:
    name: Backend Parity
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cargo/git/checkouts/
            target/
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-base-${{ hashFiles('**/Cargo.lock') }}
            ${{ runner.os }}-cargo-base-
            ${{ runner.os }}-cargo-
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: ./tests/run_backend_parity.sh

  e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cargo/git/checkouts/
            target/
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-base-${{ hashFiles('**/Cargo.lock') }}
            ${{ runner.os }}-cargo-base-
            ${{ runner.os }}-cargo-
      - run: cargo build --release
      - name: Run E2E smoke tests
        run: TAIDA_BIN=./target/release/taida ./tests/e2e_smoke.sh

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cargo/git/checkouts/
            target/
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-base-${{ hashFiles('**/Cargo.lock') }}
            ${{ runner.os }}-cargo-base-
            ${{ runner.os }}-cargo-
      - run: cargo clippy --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
