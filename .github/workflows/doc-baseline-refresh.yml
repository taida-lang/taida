name: Doc Baseline Refresh

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@2ea1b3bdd0261867664fd125505456a7b9c3385c # 1.93.1
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          shared-key: cargo-base
      - name: Run doc parse baseline probe
        run: cargo test --test c25b_008_doc_examples_probe -- --ignored --nocapture
      - name: Run committed baseline guard
        run: cargo test --test c25b_008_doc_examples_parse -- --nocapture
