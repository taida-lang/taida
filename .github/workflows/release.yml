name: Release

on:
  push:
    tags:
      - "@*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to package, for example @a.1.alpha"
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # GitHub runners can force JavaScript actions that still declare node20
  # metadata to execute on Node 24. Keep this enabled until all pinned release
  # actions have native Node 24 metadata.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    outputs:
      release_ref: ${{ steps.resolve.outputs.release_ref }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    steps:
      - name: Resolve and validate release tag
        id: resolve
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_REF: ${{ github.ref }}
          EVENT_REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_tag="${INPUT_TAG}"
            release_ref="refs/tags/${release_tag}"
          else
            release_tag="${EVENT_REF_NAME}"
            release_ref="${EVENT_REF}"
          fi

          if [[ ! "${release_tag}" =~ ^@[a-z]\.[0-9]+(\.[a-z0-9][a-z0-9-]*)?$ ]]; then
            echo "invalid release tag: ${release_tag}" >&2
            exit 1
          fi

          printf 'release_ref=%s\n' "${release_ref}" >> "${GITHUB_OUTPUT}"
          printf 'release_tag=%s\n' "${release_tag}" >> "${GITHUB_OUTPUT}"

  gate:
    name: Release Gate
    needs: prepare
    runs-on: ubuntu-latest
    env:
      TAIDA_RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}
      - uses: dtolnay/rust-toolchain@2ea1b3bdd0261867664fd125505456a7b9c3385c # 1.93.1
        with:
          components: clippy, rustfmt
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
      - name: Install ripgrep (secret scan)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep
      - name: Secret scan
        run: ./scripts/release/secret-scan.sh
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - uses: taiki-e/install-action@285e94bf531e72a83c0923d52526fabb44c3b169 # nextest
      - name: Install wasmtime
        run: |
          set -euo pipefail
          WASMTIME_VERSION=v33.0.0
          WASMTIME_SHA256=075d491ad2c9855c6247b7ca4284a833d1f3b51e85339e0f6be4e64620ea7f40
          curl -L "https://github.com/bytecodealliance/wasmtime/releases/download/${WASMTIME_VERSION}/wasmtime-${WASMTIME_VERSION}-x86_64-linux.tar.xz" -o wasmtime.tar.xz
          echo "${WASMTIME_SHA256}  wasmtime.tar.xz" | sha256sum -c -
          tar xf wasmtime.tar.xz
          mkdir -p "$HOME/.wasmtime/bin"
          mv "wasmtime-${WASMTIME_VERSION}-x86_64-linux/wasmtime" "$HOME/.wasmtime/bin/wasmtime"
          echo "$HOME/.wasmtime/bin" >> "$GITHUB_PATH"
      - run: cargo nextest run --profile ci
      - run: cargo build --locked --release
      - run: ./tests/run_backend_parity.sh
      - run: TAIDA_BIN="$PWD/target/release/taida" ./tests/e2e_smoke.sh
      - name: Write release gate summary
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          cat <<EOF | tee release-gate-summary.md >> "${GITHUB_STEP_SUMMARY}"
          ## Release Gate

          - Decision: \`Go\`
          - Tag: \`${RELEASE_TAG}\`
          - Distribution channel: \`install.sh\` via \`taida.dev\`
          - Release assets: GitHub Release archives + \`SHA256SUMS\`
          - Canary policy: one-host private canary before announcement
          - Rollback policy: delete release/tag and revert merge commit on \`main\` if stop conditions hit
          EOF
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: release-gate-summary
          path: release-gate-summary.md
          if-no-files-found: error

  build:
    name: Build ${{ matrix.label }}
    needs:
      - prepare
      - gate
    runs-on: ${{ matrix.runner }}
    env:
      TAIDA_RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_path: target/release/taida
          - label: macos-x86_64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            binary_path: target/release/taida
          - label: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_path: target/release/taida
          - label: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_path: target/release/taida.exe
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}
      - uses: dtolnay/rust-toolchain@2ea1b3bdd0261867664fd125505456a7b9c3385c # 1.93.1
      - name: Build release binary
        run: cargo build --locked --release
      - name: Package Unix archive
        if: runner.os != 'Windows'
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          ./scripts/release/package-unix.sh \
            "${{ matrix.binary_path }}" \
            "${RELEASE_TAG}" \
            "${{ matrix.target }}" \
            dist
      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          ./scripts/release/package-windows.ps1 `
            -BinaryPath "${{ matrix.binary_path }}" `
            -Tag "${env:RELEASE_TAG}" `
            -Target "${{ matrix.target }}" `
            -OutDir "dist"
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: release-${{ matrix.target }}
          path: dist/taida-${{ needs.prepare.outputs.release_tag }}-${{ matrix.target }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  # C26B-007 Sub-phase 7.4 (SEC-011): Sigstore keyless signing.
  # Each release artefact (including SHA256SUMS) is signed via cosign
  # using the ambient GitHub OIDC token. No long-lived signing key is
  # stored anywhere; verification relies on the Rekor transparency log.
  #
  # The resulting `.cosign.bundle` files are uploaded alongside the
  # binaries so `install.sh` and `taida ingot install` can call
  # `scripts/release/verify-signatures.sh` before trusting a download.
  sign:
    name: Sign Release Artefacts (Sigstore)
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required by cosign for keyless OIDC flow.
      id-token: write
    outputs:
      artefact_digests: ${{ steps.digest.outputs.digests }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        working-directory: dist
        run: sha256sum taida-* > SHA256SUMS
      - name: Install cosign
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3
        with:
          cosign-release: v2.4.1
      - name: Sign release artefacts (cosign keyless)
        working-directory: dist
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          # Sign each packaged binary plus SHA256SUMS. Skips anything
          # that is already a .cosign.bundle or .sig (defensive — in
          # case the job retries). Glob prefixed with ./ to avoid
          # filenames being interpreted as options (shellcheck SC2035).
          for f in ./taida-* SHA256SUMS; do
              [ -f "${f}" ] || continue
              case "${f}" in
                  *.cosign.bundle|*.sig) continue ;;
              esac
              echo "::group::sign ${f}"
              cosign sign-blob \
                  --bundle "${f}.cosign.bundle" \
                  --yes \
                  "${f}"
              echo "::endgroup::"
          done
          echo "Signed artefacts:"
          ls -la ./*.cosign.bundle
      - name: Compute artefact digests (for SLSA subjects)
        id: digest
        working-directory: dist
        run: |
          set -euo pipefail
          # Emit a base64(sha256sum style) digest list for the SLSA
          # generator. slsa-github-generator/generator_generic_slsa3
          # expects `<digest>  <name>` newline-delimited.
          digests=$(sha256sum taida-* SHA256SUMS | base64 -w0)
          echo "digests=${digests}" >> "${GITHUB_OUTPUT}"
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: release-signed
          path: |
            dist/taida-*
            dist/SHA256SUMS
            dist/*.cosign.bundle
          if-no-files-found: error

  # C26B-007 Sub-phase 7.4 (SEC-011): SLSA Level 3 provenance.
  # Uses the upstream reusable workflow so the provenance document is
  # produced inside a hermetic GitHub-hosted builder, signed via the
  # same Sigstore keyless flow, and uploaded to Rekor. The resulting
  # `.intoto.jsonl` is attached to the release alongside the signatures.
  provenance:
    name: Generate SLSA Provenance
    needs:
      - prepare
      - sign
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      base64-subjects: ${{ needs.sign.outputs.artefact_digests }}
      upload-assets: false
      provenance-name: taida-release-provenance.intoto.jsonl
      compile-generator: true

  publish:
    name: Publish Release
    needs:
      - prepare
      - build
      - sign
      - provenance
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: release-signed
          path: dist
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: taida-release-provenance.intoto.jsonl
          path: dist
      - name: Normalize provenance asset name
        working-directory: dist
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          set -euo pipefail
          mv taida-release-provenance.intoto.jsonl "taida-${RELEASE_TAG}.intoto.jsonl"
      - name: List signed artefacts
        working-directory: dist
        run: |
          ls -la
          echo "expected: taida-* binaries + taida-*.intoto.jsonl + SHA256SUMS + *.cosign.bundle"
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          REPO: ${{ github.repository }}
        run: |
          HEADER="Official Taida release assets for \`${RELEASE_TAG}\`.

          \`install.sh\` should download one of the packaged binaries below, verify it against \`SHA256SUMS\`, and only fall back to source build when no prebuilt target matches.

          Every artefact is signed via Sigstore keyless cosign (C26B-007 Sub-phase 7.4 / SEC-011). Verify a download with:

          \`\`\`
          cosign verify-blob \\
              --bundle taida-<TAG>-<TARGET>.<EXT>.cosign.bundle \\
              --certificate-identity-regexp '^https://github.com/${REPO}/' \\
              --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \\
              taida-<TAG>-<TARGET>.<EXT>
          \`\`\`

          SLSA Level 3 provenance is attached as \`*.intoto.jsonl\` (generated by the \`slsa-github-generator\` reusable workflow).

          ---
          "
          GENERATED=$(gh api "repos/${REPO}/releases/generate-notes" \
            -f tag_name="${RELEASE_TAG}" -q '.body')
          NOTES="${HEADER}${GENERATED}"

          # D29B-013 / Lock-I: idempotent release dispatcher.
          #
          # `gh release create` hard-fails with `release already exists`
          # when its tag is already published, which broke the `@d.28`
          # release run (manual `gh release delete` + rerun was required).
          # Stable-cycle re-runs (asset-only fixes, signature retries,
          # SHA256SUMS regen) must complete without manual operator
          # intervention, so we branch on existence:
          #   * exists  → upload assets with --clobber + edit notes
          #   * absent  → create as before
          if gh release view "${RELEASE_TAG}" --repo "${REPO}" >/dev/null 2>&1; then
            echo "release ${RELEASE_TAG} already exists; updating assets and notes"
            gh release upload "${RELEASE_TAG}" dist/* \
              --repo "${REPO}" \
              --clobber
            gh release edit "${RELEASE_TAG}" \
              --repo "${REPO}" \
              --title "${RELEASE_TAG}" \
              --notes "${NOTES}"
          else
            echo "release ${RELEASE_TAG} does not exist; creating"
            gh release create "${RELEASE_TAG}" dist/* \
              --repo "${REPO}" \
              --title "${RELEASE_TAG}" \
              --notes "${NOTES}"
          fi
