name: Release

on:
  push:
    tags:
      - "@*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to package, for example @a.1.alpha"
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    outputs:
      release_ref: ${{ steps.resolve.outputs.release_ref }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    steps:
      - name: Resolve and validate release tag
        id: resolve
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_REF: ${{ github.ref }}
          EVENT_REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_tag="${INPUT_TAG}"
            release_ref="refs/tags/${release_tag}"
          else
            release_tag="${EVENT_REF_NAME}"
            release_ref="${EVENT_REF}"
          fi

          if [[ ! "${release_tag}" =~ ^@[A-Za-z0-9]+(\.[A-Za-z0-9-]+)+$ ]]; then
            echo "invalid release tag: ${release_tag}" >&2
            exit 1
          fi

          printf 'release_ref=%s\n' "${release_ref}" >> "${GITHUB_OUTPUT}"
          printf 'release_tag=%s\n' "${release_tag}" >> "${GITHUB_OUTPUT}"

  gate:
    name: Release Gate
    needs: prepare
    runs-on: ubuntu-latest
    env:
      TAIDA_RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cargo/git/checkouts/
            target/
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-
            ${{ runner.os }}-cargo-
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Secret scan
        run: ./scripts/release/secret-scan.sh
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - run: cargo build --release
      - run: ./tests/run_backend_parity.sh
      - run: TAIDA_BIN=./target/release/taida ./tests/e2e_smoke.sh
      - name: Write release gate summary
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          cat <<EOF | tee release-gate-summary.md >> "${GITHUB_STEP_SUMMARY}"
          ## Release Gate

          - Decision: `Go`
          - Tag: \`${RELEASE_TAG}\`
          - Distribution channel: \`install.sh\` via \`taida.dev\`
          - Release assets: GitHub Release archives + \`SHA256SUMS\`
          - Canary policy: one-host private canary before announcement
          - Rollback policy: delete release/tag and revert merge commit on \`main\` if stop conditions hit
          EOF
      - uses: actions/upload-artifact@v6
        with:
          name: release-gate-summary
          path: release-gate-summary.md
          if-no-files-found: error

  build:
    name: Build ${{ matrix.label }}
    needs:
      - prepare
      - gate
    runs-on: ${{ matrix.runner }}
    env:
      TAIDA_RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_path: target/release/taida
          - label: macos-x86_64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            binary_path: target/release/taida
          - label: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_path: target/release/taida
          - label: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_path: target/release/taida.exe
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cargo/git/checkouts/
            target/
          key: ${{ runner.os }}-cargo-build-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-${{ matrix.target }}-
            ${{ runner.os }}-cargo-build-
      - name: Build release binary
        run: cargo build --locked --release
      - name: Package Unix archive
        if: runner.os != 'Windows'
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          ./scripts/release/package-unix.sh \
            "${{ matrix.binary_path }}" \
            "${RELEASE_TAG}" \
            "${{ matrix.target }}" \
            dist
      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          ./scripts/release/package-windows.ps1 `
            -BinaryPath "${{ matrix.binary_path }}" `
            -Tag "${env:RELEASE_TAG}" `
            -Target "${{ matrix.target }}" `
            -OutDir "dist"
      - uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.target }}
          path: dist/taida-${{ needs.prepare.outputs.release_tag }}-${{ matrix.target }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  publish:
    name: Publish Release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        working-directory: dist
        run: sha256sum taida-* > SHA256SUMS
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          generate_release_notes: true
          files: |
            dist/*
          body: |
            Official Taida release assets for `${{ needs.prepare.outputs.release_tag }}`.

            `install.sh` should download one of the packaged binaries below, verify it against `SHA256SUMS`, and only fall back to source build when no prebuilt target matches.
