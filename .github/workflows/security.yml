name: Security

# C25B-006: continuous supply-chain monitoring via cargo-audit
# (RustSec advisory DB lookup) + cargo-deny (licences / multiple
# versions / yanked crates / sources allow-list). Runs on every push
# to the main RC branches and weekly on a fixed schedule so advisories
# published between pushes are still surfaced.
#
# C26B-007 Sub-phase 7.2 (2026-04-24): promoted both jobs from
# warn-only to hard-fail. The advisory baseline has been curated for a
# full `@c.25.rc7` release window (no outstanding vulnerabilities in
# the workspace graph as of 2026-04-24) so a fresh advisory that the
# cargo-audit / cargo-deny gate surfaces now blocks the pipeline.
#
# C26B-007 Sub-phase 7.3 (2026-04-24): added `c-static-analysis` job.
# Assembles the native_runtime C fragments in the same order used by
# the runtime (`native_runtime/mod.rs::NATIVE_RUNTIME_C`) and runs
# gcc -Wall -Wextra -Wformat-security + cppcheck on the TU. Uses a
# delta-based gate against the baseline recorded in
# `.dev/C26_C_STATIC_ANALYSIS.md` so a new warning introduced by any
# change to the C fragments fails the job.
#
# Scope isolation (Phase 6 driver): this workflow lives in its own
# file. The existing `.github/workflows/ci.yml` is not touched — CI
# wallclock is the Phase 2 driver's domain.

on:
  push:
    branches: [main, develop, feat/c25, feat/c26]
  pull_request:
    branches: [main, develop]
  schedule:
    # Every Monday 06:00 UTC. Weekly cadence catches advisories
    # published between pushes without adding noticeable load.
    - cron: "0 6 * * 1"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

# Serialise duplicate runs on the same ref; `schedule` dispatches are
# uniquely identified by run_id so the concurrency lock does not
# collapse them with push-triggered runs.
concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  cargo-audit:
    name: cargo-audit (RustSec DB)
    runs-on: ubuntu-latest
    # C26B-007 Sub-phase 7.2: hard-fail gate. `continue-on-error` was
    # `true` during @c.25.rc7; it is removed here so any advisory that
    # cargo-audit surfaces blocks the pipeline.
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo-audit binary
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/cargo-audit
            ~/.cargo/advisory-db
          key: ${{ runner.os }}-cargo-audit-v1-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-audit-v1-
      - name: Install cargo-audit
        run: |
          if ! command -v cargo-audit >/dev/null 2>&1; then
            cargo install cargo-audit --locked
          fi
      - name: Run cargo-audit
        # `cargo audit` exits non-zero on vulnerability or unmaintained
        # advisories. Under C26B-007 Sub-phase 7.2 that non-zero exit
        # fails the job (hard-fail gate).
        run: cargo audit

  cargo-deny:
    name: cargo-deny (licences / bans / sources)
    runs-on: ubuntu-latest
    # C26B-007 Sub-phase 7.2: hard-fail gate (same rationale as
    # cargo-audit above). `continue-on-error` removed.
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo-deny binary
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-deny
          key: ${{ runner.os }}-cargo-deny-v1-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-deny-v1-
      - name: Install cargo-deny
        run: |
          if ! command -v cargo-deny >/dev/null 2>&1; then
            cargo install cargo-deny --locked
          fi
      - name: Run cargo-deny check
        # `advisories`, `bans`, `licenses`, `sources` checks in one
        # pass. Config lives at `./deny.toml`. Under C26B-007 Sub-phase
        # 7.2 the hard-fail categories in deny.toml (vulnerability /
        # yanked) now block the gate.
        run: cargo deny --log-level warn check advisories bans licenses sources

  c-static-analysis:
    name: C static analysis (native_runtime TU)
    runs-on: ubuntu-latest
    # C26B-007 Sub-phase 7.3: assemble the native_runtime C fragments
    # in the same concatenation order as
    # `native_runtime/mod.rs::NATIVE_RUNTIME_C` and run gcc + cppcheck
    # on the assembled TU. Hard-fails on a delta against the baseline
    # in `.dev/C26_C_STATIC_ANALYSIS.md`.
    steps:
      - uses: actions/checkout@v5
      - name: Install analyzers
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends cppcheck gcc
      - name: Assemble native_runtime TU
        # Order must match src/codegen/native_runtime/mod.rs:91-105
        # (CORE -> OS -> TLS -> NET_H1_H2 -> NET_H3_QUIC).
        run: |
          mkdir -p /tmp/c-analysis
          cat src/codegen/native_runtime/core.c \
              src/codegen/native_runtime/os.c \
              src/codegen/native_runtime/tls.c \
              src/codegen/native_runtime/net_h1_h2.c \
              src/codegen/native_runtime/net_h3_quic.c \
              > /tmp/c-analysis/native_runtime_assembled.c
          echo "Assembled TU: $(wc -l < /tmp/c-analysis/native_runtime_assembled.c) lines"
      - name: gcc -Wall -Wextra (delta gate)
        # Baseline recorded in .dev/C26_C_STATIC_ANALYSIS.md: 78 warnings.
        # A new warning (any category) fails the job.
        run: |
          set -euo pipefail
          gcc -fsyntax-only -Wall -Wextra -Wformat-security \
              /tmp/c-analysis/native_runtime_assembled.c \
              2> /tmp/c-analysis/gcc.log || true
          count=$(grep -cE "warning:" /tmp/c-analysis/gcc.log || true)
          echo "gcc warning count: ${count} (baseline: 78)"
          if [ "${count}" -gt 78 ]; then
              echo "::error::gcc warnings increased: ${count} > 78 baseline."
              echo "See .dev/C26_C_STATIC_ANALYSIS.md for the allowlist/fix-queue policy."
              grep -E "warning:" /tmp/c-analysis/gcc.log | head -80
              exit 1
          fi
      - name: cppcheck (security categories)
        # Security gate scope: `warning` (null-deref, uninit-var, memory
        # leak, etc.), `performance`, and `portability` — the categories
        # that carry genuine security / correctness weight. `style` is
        # intentionally NOT enabled.
        #
        # Why `style` is out of scope for this gate:
        #   * `style` is dominated by value-analysis false positives from
        #     cppcheck's dataflow solver (`knownConditionTrueFalse`,
        #     `redundantCondition`) on paths where cppcheck conservatively
        #     folds a constant through a range it cannot prove otherwise
        #     (e.g. HTTP parsers where `val_len = end - start` after a
        #     trim loop — runtime-dependent but statically folded to 0).
        #   * The native runtime intentionally uses defence-in-depth
        #     guard idioms (`if (p == 0 || p < 4096) return ...;`) and
        #     reserves-for-future-expansion predicates like
        #     `taida_hashmap_key_valid(...)`. These read as
        #     "always-true/false" to cppcheck's solver but are load-
        #     bearing to the runtime's safety posture.
        #   * Cosmetic / stylistic concerns are already covered by the
        #     gcc `-Wall -Wextra -Wformat-security` step above; there is
        #     no security-critical check that only `style` surfaces.
        #
        # If `style` is re-enabled in the future it must come with a
        # triage pass of the defence-in-depth sites and an updated
        # baseline in `.dev/C26_C_STATIC_ANALYSIS.md`.
        run: |
          set -euo pipefail
          # `--inline-suppr` enables the handful of `// cppcheck-suppress`
          # comments in core.c for call-site-specific false positives
          # that survive the scope reduction above (documented in-place):
          #   * `nullPointerArithmeticRedundantCheck` on the string
          #     refcount hidden-header pointer arithmetic — already
          #     guarded by an explicit `ptr == 0 || ptr < 4096 || ptr < 0`
          #     triplet that cppcheck's solver does not fully absorb.
          #   * `shiftTooManyBitsSigned` on `taida_shift_r`'s arithmetic
          #     right shift — deliberate implementation-defined behaviour
          #     contracted by the Taida surface, documented at the site.
          #
          # `legacyUninitvar` is suppressed globally. It is cppcheck's
          # pre-value-flow checker and is superseded by the modern
          # `uninitvar` (which stays enabled and did catch the real
          # json_val scalar-init miss fixed in a18e765). Upstream
          # cppcheck documents `legacyUninitvar` as producing
          # false positives on patterns like:
          #     char *p = NULL; p = factory(); if (p) use(p);
          #     H3Header arr[N]; memset(arr, 0, sizeof arr); snprintf(arr[0]....);
          # where every byte is defined on every reachable path but the
          # legacy dataflow still reports uninit. Keeping it enabled
          # means the gate plays whack-a-mole across the HTTP parsers
          # without surfacing any real bug; the modern `uninitvar` is
          # the signal we want.
          cppcheck --enable=warning,performance,portability \
                   --suppress=missingIncludeSystem \
                   --suppress=legacyUninitvar \
                   --inline-suppr \
                   --error-exitcode=1 \
                   --quiet \
                   /tmp/c-analysis/native_runtime_assembled.c \
                   2> /tmp/c-analysis/cppcheck.log || rc=$?
          rc=${rc:-0}
          echo "cppcheck findings (first 60 lines):"
          head -60 /tmp/c-analysis/cppcheck.log || true
          if [ "${rc}" -ne 0 ]; then
              echo "::error::cppcheck reported error-severity finding (exit ${rc})."
              exit 1
          fi
