# cargo-deny configuration — C25B-006 continuous dependency audit.
#
# C26B-007 Sub-phase 7.2 (2026-04-24): the companion workflow
# `.github/workflows/security.yml` removed `continue-on-error: true`
# for both `cargo-audit` and `cargo-deny` jobs, promoting the gate to
# hard-fail. This config matches:
#
#   * `[advisories]` — vulnerabilities block the gate (default cargo-deny
#     behaviour). Yanked / unmaintained remain `warn` / `none` because
#     the workspace currently has one yanked transitive dep
#     (`fastrand 2.4.0` via `h3`) that requires a dependency lockfile
#     bump to resolve; promoting yanked to `deny` before that bump
#     would red the gate without a user-facing surface change. The bump
#     is tracked as an independent deps-hygiene follow-up and does not
#     block the C26 stable gate.
#
#   * `[bans]` — multiple-versions / wildcards are still `warn` to keep
#     the tokio / cranelift ecosystem duplicates visible without hard-
#     failing. Promotion to `deny` is a dependency-tree cleanup task,
#     not a stable blocker.
#
#   * `[licenses]` — allowlist is hard-fail by construction (a license
#     outside the list fails the gate).
#
#   * `[sources]` — unknown-registry / unknown-git remain `warn`.
#     Promotion requires auditing every git dep. Taida currently has
#     zero git deps so the risk surface is empty either way.
#
# Related: `.github/SECURITY.md`, `.dev/taida-logs/docs/archive/SECURITY_AUDIT.md`,
# `.dev/C26_BLOCKERS.md::C26B-007`.

[graph]
# Scan all targets cargo knows about, including build scripts and dev-
# dependencies. Dev-deps matter because `h3` / `h3-quinn` (NET interop
# test helpers) are dev-only.
all-features = true

[advisories]
# cargo-audit-style database lookup.
# - vulnerabilities: hard-fail (cargo-deny default).
# - yanked: `warn`. See the header comment for rationale (requires an
#   independent lockfile bump; tracked separately).
# - unmaintained: `none` (disabled) because RUSTSEC-2025-0134
#   (rustls-pemfile) is a transitive dep with no drop-in replacement.
#   Promotion to `warn` / `deny` is a dependency-tree cleanup task and
#   does not block the C26 stable gate.
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "warn"
unmaintained = "none"
ignore = []

[licenses]
# Allow-list modelled on the Taida Cargo.lock as of `@c.25.rc7`. The
# list is deliberately explicit so a new dependency pulling in a
# different licence triggers an explicit review rather than a silent
# accept.
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
# Crates whose SPDX expression confuses cargo-deny but whose licence
# we have reviewed out-of-band can be listed here. Kept empty to force
# explicit review.
exceptions = []

[bans]
# `warn` (not `deny`) during @c.25.rc7.
multiple-versions = "warn"
wildcards = "warn"
# Crates we deliberately refuse to pull in.
deny = []
# Crates we deliberately allow multiple versions of (duplicates that
# come from the tokio / cranelift ecosystems). Expand only when the
# duplicate is genuinely irreducible.
skip = []
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
# Crates-io + a small explicit allow-list for git dependencies. As of
# `@c.25.rc7` Taida has no git deps.
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
